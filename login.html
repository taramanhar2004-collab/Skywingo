<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVerse Pro - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-bg auth-bg-1"></div>
  <div class="auth-bg auth-bg-2"></div>
  <div class="auth-bg auth-bg-3"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand-top">
        <div class="brand-logo">🎮</div>
        <h1>GameVerse Pro</h1>
        <p>Login karke gaming dashboard open karo</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />
        </div>

        <button type="submit" class="primary-btn">Login</button>
        <p id="loginMsg" class="form-msg"></p>
      </form>

      <div class="auth-switch">
        Account nahi hai?
        <a href="signup.html">Signup karo</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
