<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVerse Pro - Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-bg auth-bg-1"></div>
  <div class="auth-bg auth-bg-2"></div>
  <div class="auth-bg auth-bg-3"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand-top">
        <div class="brand-logo">🎮</div>
        <h1>Create Account</h1>
        <p>Professional gaming portal me signup karo</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Enter full name" required />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create password" required />
        </div>

        <button type="submit" class="primary-btn">Create Account</button>
        <p id="signupMsg" class="form-msg"></p>
      </form>

      <div class="auth-switch">
        Already account hai?
        <a href="login.html">Login karo</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
